# ============================================================
#  mango config
#  RTX 3080Ti | Ryzen 9950X | MSI MPG 322URX QD-OLED
# ============================================================

[core]
plugins = \
    alpha        \
    animate      \
    autostart    \
    blur         \
    command      \
    decoration   \
    expo         \
    fast-switcher \
    foreign-toplevel \
    grid         \
    idle         \
    move         \
    place        \
    resize       \
    scale        \
    switcher     \
    vswitch      \
    wm-actions   \
    wobbly       \
    zoom

xwayland = true

# ── OLED 240Hz Output Configuration (HDMI 2.1) ────────────
[output:HDMI-A-1]
mode = 3840x2160@240000
position = 0,0
transform = normal
# NEW SCALING APPLIED HERE
scale = 1.3
vrr = 1

# ── Autostart ─────────────────────────────────────────────
[autostart]
# Environment variables updated for 1.3 GTK / 1.0 Qt scaling
a_env       = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Wayfire GDK_SCALE=1 GDK_DPI_SCALE=1 QT_SCALE_FACTOR=1.0 QT_AUTO_SCREEN_SCALE_FACTOR=0 QT_ENABLE_HIGHDPI_SCALING=0 XCURSOR_SIZE=32 XCURSOR_THEME=Adwaita
b_polkit    = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
c_wallpaper = swaybg -m fill -i ~/Pictures/Wallpapers/wallpaper.jpg
d_mako      = mako
e_waybar    = waybar -c ~/.config/waybar/config.jsonc -s ~/.config/waybar/style.css
f_nm        = nm-applet --indicator
g_blueman   = blueman-applet
h_openrgb   = openrgb --startminimized
i_idle      = swayidle -w timeout 300 'swaylock -f --color 000000' timeout 600 'wlr-randr --output HDMI-A-1 --off' resume 'wlr-randr --output HDMI-A-1 --on' before-sleep 'swaylock -f --color 000000'
j_scaling   = gsettings set org.gnome.desktop.interface text-scaling-factor 1.0
k_cursor    = gsettings set org.gnome.desktop.interface cursor-size 32

# ── Key bindings (Optimized for Lightweight Apps) ─────────
[command]
binding_terminal          = <super> <shift> KEY_ENTER
command_terminal          = foot

binding_launcher          = <super> KEY_SPACE
command_launcher          = wofi --show drun

binding_files             = <super> KEY_E
command_files             = pcmanfm-qt

binding_lock              = <super> KEY_L
command_lock              = swaylock -f --color 000000

binding_power             = <ctrl> <super> KEY_DELETE
command_power             = wlogout

binding_restart_wayfire   = <ctrl> <super> KEY_R
command_restart_wayfire   = pkill wayfire

binding_screenshot        = KEY_PRINT
command_screenshot        = bash -c 'mkdir -p ~/Pictures/Screenshots && grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot saved"'

binding_screenshot_region = <shift> KEY_PRINT
command_screenshot_region = bash -c 'mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot saved"'

binding_vol_up            = KEY_VOLUMEUP
command_vol_up            = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binding_vol_down          = KEY_VOLUMEDOWN
command_vol_down          = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binding_vol_mute          = KEY_MUTE
command_vol_mute          = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# ── Window management ─────────────────────────────────────
[move]
activate = <super> BTN_LEFT

[resize]
activate = <super> BTN_RIGHT

[wm-actions]
toggle_fullscreen    = <super> KEY_F
toggle_always_on_top = <super> <shift> KEY_T

# ── Workspaces ────────────────────────────────────────────
[vswitch]
binding_left   = <ctrl> <super> KEY_LEFT
binding_right  = <ctrl> <super> KEY_RIGHT
binding_up     = <ctrl> <super> KEY_UP
binding_down   = <ctrl> <super> KEY_DOWN
with_win_left  = <ctrl> <super> <shift> KEY_LEFT
with_win_right = <ctrl> <super> <shift> KEY_RIGHT

# ── Alt-Tab ───────────────────────────────────────────────
[switcher]
next_view = <alt> KEY_TAB
prev_view = <alt> <shift> KEY_TAB

# ── Scale (overview) ──────────────────────────────────────
[scale]
toggle     = <super> KEY_S
toggle_all = <super> <shift> KEY_S
interact   = true

# ── Expo (workspace overview) ─────────────────────────────
[expo]
toggle = <super> KEY_W

# ── Window decorations ────────────────────────────────────
[decoration]
title_height   = 30
border_size    = 2
active_color   = 0.10 0.10 0.18 0.95
inactive_color = 0.06 0.06 0.10 0.80
button_order   = minimize maximize close

# ── Animations ───────────────────────────────────────────
[animate]
open_animation  = zoom
close_animation = zoom
duration        = 200

# ── Wobbly windows ───────────────────────────────────────
[wobbly]
spring_k  = 8.0
friction  = 3.0
mass      = 50.0

# ── Blur ─────────────────────────────────────────────────
[blur]
method     = kawase
iterations = 2
offset     = 4
saturation = 1.1

# ── Idle (QD-OLED Optimizations) ─────────────────────────
[idle]
toggle              = <super> KEY_I
screensaver_timeout = 300
dpms_timeout        = 600

# ── Zoom ─────────────────────────────────────────────────
[zoom]
modifier = <super>
speed    = 0.1

# ── Grid tiling ──────────────────────────────────────────
[grid]
slot_c  = <super> KEY_KP5
slot_l  = <super> KEY_KP4
slot_r  = <super> KEY_KP6
slot_t  = <super> KEY_KP8
slot_b  = <super> KEY_KP2
slot_tl = <super> KEY_KP7
slot_tr = <super> KEY_KP9
slot_bl = <super> KEY_KP1
slot_br = <super> KEY_KP3
