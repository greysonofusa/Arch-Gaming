# ============================================================
#  config.conf — MangoWM compositor config
#  RTX 3080Ti | Ryzen 9950X | MSI MPG 322URX QD-OLED
# ============================================================

# ── Environment Variables (1.3 GTK / 1.0 Qt Scaling) ──────
env=GBM_BACKEND,nvidia-drm
env=__GLX_VENDOR_LIBRARY_NAME,nvidia
env=LIBVA_DRIVER_NAME,nvidia
env=QT_QPA_PLATFORM,wayland;xcb
env=QT_QPA_PLATFORMTHEME,qt6ct
env=SDL_VIDEODRIVER,wayland
env=_JAVA_AWT_WM_NONREPARENTING,1
env=QT_AUTO_SCREEN_SCALE_FACTOR,0
env=QT_ENABLE_HIGHDPI_SCALING,0
env=QT_SCALE_FACTOR,1.0
env=GDK_SCALE,1
env=XCURSOR_SIZE,32
env=XCURSOR_THEME,Adwaita

# ── Autostart ─────────────────────────────────────────────
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=mangowm
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once=swaybg -m fill -i ~/Pictures/Wallpapers/wallpaper.jpg
exec-once=mako
exec-once=waybar -c ~/.config/waybar/config.jsonc -s ~/.config/waybar/style.css
exec-once=nm-applet --indicator
exec-once=blueman-applet
exec-once=openrgb --startminimized

# OLED Protection: 5 mins to black screensaver, 10 mins to display off
exec-once=swayidle -w timeout 300 'swaylock -f --color 000000' timeout 600 'wlr-randr --output HDMI-A-1 --off' resume 'wlr-randr --output HDMI-A-1 --on' before-sleep 'swaylock -f --color 000000'

# ── Monitors (HDMI 2.1, 4K 240Hz, 1.3 Scale, VRR) ─────────
monitorrule=name:HDMI-A-1,width:3840,height:2160,refresh:240,x:0,y:0,scale:1.3,vrr:1

# ── Key bindings ──────────────────────────────────────────
# Terminal & Apps
bind=SUPER SHIFT,Return,spawn,foot
bind=SUPER,Space,spawn,wofi --show drun
bind=SUPER,e,spawn,pcmanfm-qt
bind=SUPER,l,spawn,swaylock -f --color 000000
bind=CTRL SUPER,Delete,spawn,wlogout
bind=SUPER,q,killclient,
bind=CTRL SUPER,r,quit,

# Screenshots
bind=,Print,spawn,bash -c 'mkdir -p ~/Pictures/Screenshots && grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot saved"'
bind=SHIFT,Print,spawn,bash -c 'mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot saved"'

# Audio Control
bind=,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind=,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Window Management & Focus
bind=SUPER,f,fullscreen,
bind=ALT,Tab,focusdir,next
bind=ALT SHIFT,Tab,focusdir,prev
