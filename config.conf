# ==========================================
# MANGO WM CONFIGURATION (9950X / RTX 3080 Ti)
# ==========================================

# --- DISPLAY & SCALING ---
# 1.5x scaling to fix tiny text on high-res displays
output * scale 1.5

# --- AUTOSTART ---
exec=waybar
exec=swaybg -i ~/Pictures/Wallpapers/wallpaper.jpg -m fill

# --- APPEARANCE & BORDERS ---
# 'none' completely kills the orange window manager borders
default_border none
default_floating_border none

# Disables the SceneFX drop-shadow glow
shadows disable
shadow_color #00000000

# --- KEYBINDINGS ---
# Syntax: bind=MODIFIER,KEY,ACTION,ARGUMENT
# Note: Trailing commas are REQUIRED if there is no argument.

# Applications
bind=SUPER,Return,spawn,foot
bind=SUPER,Space,spawn,wofi --show drun
bind=SUPER,B,spawn,cromite

# Window Management
bind=SUPER,Q,killclient,
bind=SUPER,F,togglefullscreen,
bind=SUPER|SHIFT,Space,togglefloating,
bind=SUPER,M,quit,

# Workspaces (1-9)
bind=SUPER,1,workspace,1
bind=SUPER,2,workspace,2
bind=SUPER,3,workspace,3
bind=SUPER,4,workspace,4
bind=SUPER,5,workspace,5
bind=SUPER,6,workspace,6
bind=SUPER,7,workspace,7
bind=SUPER,8,workspace,8
bind=SUPER,9,workspace,9

# Move Windows to Workspaces
bind=SUPER|SHIFT,1,movetoworkspace,1
bind=SUPER|SHIFT,2,movetoworkspace,2
bind=SUPER|SHIFT,3,movetoworkspace,3
bind=SUPER|SHIFT,4,movetoworkspace,4
bind=SUPER|SHIFT,5,movetoworkspace,5
bind=SUPER|SHIFT,6,movetoworkspace,6
bind=SUPER|SHIFT,7,movetoworkspace,7
bind=SUPER|SHIFT,8,movetoworkspace,8
bind=SUPER|SHIFT,9,movetoworkspace,9

# Media & Volume (Uses NONE modifier to catch raw hardware keys)
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
