# ============================================================
#  MangoWC config.conf — Valid MangoWC syntax only
#  See: https://github.com/DreamMaoMao/mangowc/blob/main/config.conf
# ============================================================

# ── Display ──────────────────────────────────────────────────
monitorrule=name:HDMI-A-2,width:3840,height:2160,refresh:240,x:0,y:0,scale:1,vrr:1

# ── Window effects ───────────────────────────────────────────
blur=1
blur_optimized=1
blur_params_num_passes=2
blur_params_radius=5
shadows=1
shadow_only_floating=1
shadows_size=10
shadows_blur=15
shadows_position_x=2
shadows_position_y=4
shadowscolor=0x00000099
border_radius=8
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# ── Borders ──────────────────────────────────────────────────
# NOTE: border width and color set via bordercolor= and borderwidth=
borderwidth=2
bordercolor=0x1793d1ff
borderinactivecolor=0x2a2a3aff

# ── Animations ───────────────────────────────────────────────
animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=zoom
animation_fade_in=1
animation_fade_out=1
animation_duration_open=200
animation_duration_close=180
animation_duration_move=150
animation_duration_tag=250
zoom_initial_ratio=0.85

# ── Layout ───────────────────────────────────────────────────
default_layout=float

# ── Overview ─────────────────────────────────────────────────
hotarea_size=10
enable_hotarea=1
overviewgappi=8
overviewgappo=40

# ── General ──────────────────────────────────────────────────
gap=0
smartgaps=0
sloppyfocus=1
warpcursor=1
focus_on_activate=1
enable_floating_snap=1
snap_distance=20
cursor_size=48
new_is_master=1
default_mfact=0.55
default_nmaster=1

# ── Window rules — all windows float by default ───────────────
windowrule=isfloating:1

# ── Keyboard ─────────────────────────────────────────────────
repeat_rate=25
repeat_delay=600
xkb_rules_layout=us

# ── Autostart ────────────────────────────────────────────────
exec=~/.config/mango/autostart.sh

# ── Terminal ─────────────────────────────────────────────────
bind=SUPER,Return,spawn,kitty

# ── App launcher ─────────────────────────────────────────────
bind=SUPER,SPACE,spawn,wofi --show drun
bind=SUPER,e,spawn,thunar
bind=SUPER,l,spawn,waylock

# ── Window management ────────────────────────────────────────
bind=SUPER,q,killclient,
bind=SUPER,f,togglefloat,
bind=SUPER,SHIFT,f,togglefullscreen,
bind=SUPER,m,togglemaximize,
bind=SUPER,SHIFT,r,reload,
bind=SUPER,r,spawn,bash ~/.config/mango/rebar.sh

# ── Overview ─────────────────────────────────────────────────
bind=SUPER,0,toggleoverview,
bind=SUPER,TAB,toggleoverview,

# ── Screenshots ──────────────────────────────────────────────
bind=,Print,spawn,bash -c 'mkdir -p ~/Pictures/Screenshots && grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot saved"'
bind=SHIFT,Print,spawn,bash -c 'mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot saved"'

# ── Volume ───────────────────────────────────────────────────
bind=,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind=,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# ── Focus ────────────────────────────────────────────────────
bind=SUPER,h,focusleft,
bind=SUPER,j,focusdown,
bind=SUPER,k,focusup,
bind=SUPER,l,focusright,
bind=SUPER,LEFT,focusleft,
bind=SUPER,RIGHT,focusright,
bind=SUPER,UP,focusup,
bind=SUPER,DOWN,focusdown,

# ── Move floating windows ────────────────────────────────────
bind=SUPER SHIFT,LEFT,movewindow,left
bind=SUPER SHIFT,RIGHT,movewindow,right
bind=SUPER SHIFT,UP,movewindow,up
bind=SUPER SHIFT,DOWN,movewindow,down

# ── Tags / Workspaces ────────────────────────────────────────
bind=SUPER,1,viewtag,1
bind=SUPER,2,viewtag,2
bind=SUPER,3,viewtag,3
bind=SUPER,4,viewtag,4
bind=SUPER,5,viewtag,5
bind=SUPER,6,viewtag,6
bind=SUPER,7,viewtag,7
bind=SUPER,8,viewtag,8
bind=SUPER,9,viewtag,9

bind=SUPER SHIFT,1,tagtoclient,1
bind=SUPER SHIFT,2,tagtoclient,2
bind=SUPER SHIFT,3,tagtoclient,3
bind=SUPER SHIFT,4,tagtoclient,4
bind=SUPER SHIFT,5,tagtoclient,5
bind=SUPER SHIFT,6,tagtoclient,6
bind=SUPER SHIFT,7,tagtoclient,7
bind=SUPER SHIFT,8,tagtoclient,8
bind=SUPER SHIFT,9,tagtoclient,9

# ── Mouse ────────────────────────────────────────────────────
bindm=SUPER,mouse:272,movewindow
bindm=SUPER,mouse:273,resizewindow
